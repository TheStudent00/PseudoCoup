<title>PseudoCoup UI map (static)</title>
<style>
 :root{--m:#1a7f37;--p:#0969da;--k:#cf222e;--bg:#0d1117;--fg:#c9d1d9;--mut:#8b949e;--pan:#161b22;--ln:#30363d}

 .layout{display:flex;height:calc(100vh - 46px)}
 .side{width:300px;overflow:auto;border-right:1px solid var(--ln);padding:6px}
 .main{flex:1;overflow:auto;padding:14px}
 .scr{padding:5px 8px;border-radius:5px;cursor:pointer;display:flex;justify-content:space-between;gap:6px;align-items:center}
 .scr:hover{background:var(--pan)}.scr.sel{background:#1f6feb33;outline:1px solid var(--p)}
 .scr .nm{font-weight:600}.badge{font-size:10px;color:var(--mut)}
 .dead{color:var(--k)}.pill{font-size:10px;border:1px solid var(--ln);border-radius:10px;padding:0 6px;color:var(--mut)}
 h2{margin:0 0 2px}.sub{color:var(--mut);margin-bottom:12px}
 .cols{display:flex;gap:18px;align-items:flex-start}.col{flex:1;min-width:0;overflow:auto;border:1px solid var(--ln);border-radius:6px;padding:8px}
 ul.tree{list-style:none;margin:0;padding-left:16px}ul.tree.root{padding-left:0}
 li.node{margin:1px 0}.row{padding:1px 4px;border-radius:4px;white-space:nowrap}
 .tw{cursor:pointer;user-select:none;color:var(--mut);display:inline-block;width:12px}
 .kind{color:var(--mut)}.lbl{color:var(--fg)}.role{color:#a371f7}.gate{color:#d29922}
 .nav{color:var(--p)}.matched{border-left:3px solid var(--m);background:#1a7f3722}
 .pc_only{border-left:3px solid var(--p);background:#0969da22}
 .kt_only{border-left:3px solid var(--k);background:#cf222e22}
 .hl{outline:2px solid #d29922;outline-offset:-1px;border-radius:3px}
 .gaps{margin-top:8px}.gaps h3{margin:8px 0 4px;font-size:12px}
 .gline{padding:1px 6px;border-radius:4px;margin:1px 0}.kgap{background:#cf222e22;border-left:3px solid var(--k)}
 .pgap{background:#0969da18;border-left:3px solid var(--p)}
 .navchips a{color:var(--p);text-decoration:none;border:1px solid var(--ln);border-radius:10px;padding:0 7px;margin:2px;display:inline-block;cursor:pointer}
 .muted{color:var(--mut)}code{color:#79c0ff}

const S = DATA.screens, byId = {};
for (const k in S){ if(S[k].id) byId[S[k].id]=S[k]; }
let tm=0,tp=0,tk=0;
for(const k in S){ tm+=S[k].matched||0; tp+=S[k].pc_only_n||0; tk+=S[k].kt_only_n||0; }
const NSM = DATA.nonscreen.filter(o=>o.status==='missing').length;
document.getElementById('tot').textContent =
  Object.keys(S).length+" screens · "+tm+" matched · "+tk+" Kotlin-only gaps · "+
  DATA.nonscreen.length+" non-screen UI objects ("+NSM+" missing in PC) · "+DATA.unreachable.length+" unreachable";

function esc(s){return (s+'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function nodeRow(n){
  let s='<span class="kind">'+esc(n.kind)+'</span>';
  if(n.label) s+=' <span class="lbl">"'+esc(n.label.length>42?n.label.slice(0,42)+'…':n.label)+'"</span>';
  if(n.role) s+=' <span class="role">.'+esc(n.role)+'</span>';
  if(n.gate) s+=' <span class="gate">['+esc(n.gate)+']</span>';
  if(n.click){ const t=n.nav?('→'+n.nav):(n.handler||'?'); s+=' <span class="nav">⦿ '+esc(t)+'</span>'; }
  return s;
}
function renderTree(nodes){
  let h='<ul class="tree root">';
  for(const n of nodes) h+=renderNode(n);
  return h+'</ul>';
}
function renderNode(n){
  const has=n.children&&n.children.length;
  const dp=n.pair>=0?(' data-pair="'+n.pair+'" onmouseover="hov('+n.pair+')" onmouseout="hov(-1)"'):'';
  let h='<li class="node"><span class="row '+(n.status||'')+'"'+dp+'>';
  h+= has?'<span class="tw" onclick="tog(this)">▾</span>':'<span class="tw"></span>';
  h+=nodeRow(n)+'</span>';
  if(has){ h+='<ul class="tree">'; for(const c of n.children) h+=renderNode(c); h+='</ul>'; }
  return h+'</li>';
}
function tog(el){ const ul=el.parentElement.parentElement.querySelector('ul'); if(!ul)return;
  const hide=ul.style.display!=='none'?false:true; ul.style.display=hide?'':'none'; el.textContent=hide?'▸':'▾'; }
function hov(p){ document.querySelectorAll('.row.hl').forEach(e=>e.classList.remove('hl'));
  if(p>=0) document.querySelectorAll('[data-pair="'+p+'"]').forEach(e=>e.classList.add('hl')); }

function chips(ids){ if(!ids||!ids.length) return '<span class="muted">none</span>';
  return '<span class="navchips">'+ids.map(i=> byId[i]?'<a onclick="sel(\''+S_slug(i)+'\')">'+esc(i)+'</a>':'<span class="muted">'+esc(i)+'</span>').join('')+'</span>'; }
function S_slug(id){ return byId[id]?byId[id].slug:id; }

function sideList(){
  const side=document.getElementById('side'); let h='';
  const recs=Object.values(S).filter(r=>r.id).sort((a,b)=>a.id<b.id?-1:1);
  for(const r of recs){
    const dead = DATA.unreachable.includes(r.id);
    h+='<div class="scr" id="scr_'+r.slug+'" onclick="sel(\''+r.slug+'\')">'+
       '<span class="nm '+(dead?'dead':'')+'">'+esc(r.id)+(dead?' ⛔':'')+'</span>'+
       '<span class="badge">'+(r.compared?('<span class="pill">'+(r.matched||0)+'✓ '+(r.kt_only_n||0)+'✗</span>'):'<span class="pill">no map</span>')+'</span>'+
       '</div>';
  }
  h+='<div style="margin-top:12px;padding-top:6px;border-top:1px solid var(--ln);color:var(--mut)">UI objects — non-screen ('+DATA.nonscreen.length+')</div>';
  for(const o of DATA.nonscreen){
    const miss=o.status==='missing';
    h+='<div class="scr" id="ns_'+o.name+'" onclick="selNS(\''+o.name+'\')">'+
       '<span class="nm '+(miss?'dead':'')+'">'+esc(o.name)+(miss?' ⛔':'')+'</span>'+
       '<span class="badge"><span class="pill">'+esc(o.kind)+' · '+esc(o.area)+'</span></span></div>';
  }
  side.innerHTML=h;
}
function selNS(name){
  const o=DATA.nonscreen.find(x=>x.name===name); if(!o) return;
  document.querySelectorAll('.scr').forEach(e=>e.classList.remove('sel'));
  const el=document.getElementById('ns_'+name); if(el) el.classList.add('sel');
  const miss=o.status==='missing';
  let h='<h2>'+esc(o.name)+' <span class="pill">'+esc(o.kind)+'</span></h2>'+
    '<div class="sub">non-screen UI object · area <code>'+esc(o.area)+'</code> · WFL <code>'+esc(o.file)+'</code></div>';
  if(miss) h+='<div class="gline kgap">⛔ MISSING in PseudoCoup — WFL has this overlay; PC builds no equivalent'+
    (o.where&&o.where.length?(' &nbsp;(flagged on screen: '+o.where.map(esc).join(', ')+')'):'')+'</div>';
  else h+='<div class="gline pgap">not confirmed missing by the static compare — likely built inside its screen; open that screen to verify</div>';
  if(o.note) h+='<div class="sub" style="margin-top:10px">'+esc(o.note)+'</div>';
  document.getElementById('main').innerHTML=h;
}
function sel(slug){
  const r=S[slug]; if(!r) return;
  document.querySelectorAll('.scr').forEach(e=>e.classList.remove('sel'));
  const el=document.getElementById('scr_'+slug); if(el) el.classList.add('sel');
  const dead = DATA.unreachable.includes(r.id);
  let h='<h2>'+esc(r.id)+'</h2><div class="sub">'+esc(r.slug)+'.py'+
    (r.vm?(' · ViewModel: <code>'+esc(r.vm)+'</code>'):' · <span class="muted">no ViewModel</span>')+
    (r.compared?'':' · <span class="muted">no WFL blueprint mapped</span>')+'</div>';
  h+='<div class="sub"><b>nav out →</b> '+chips(r.nav_out)+
     (r.dynamic_nav?' <span class="gate" title="navigate(var) — destination computed at runtime, not statically resolvable">⚡ + dynamic</span>':'')+
     ' &nbsp;&nbsp; <b>← nav in</b> '+chips(r.inbound)+
     (dead?' &nbsp; <span class="dead">⛔ no STATIC path from '+DATA.entry+' (only reached via a dynamic navigate)</span>':'')+'</div>';
  if(r.error){ h+='<div class="kgap gline">parse error: '+esc(r.error)+'</div>'; document.getElementById('main').innerHTML=h; return; }
  h+='<div class="sub" style="margin-top:6px"><b>'+r.matched+'</b> matched '+
     '<span class="muted">(green — hover a node to link it to its partner in the other tree)</span> · '+
     '<b class="dead">'+r.kt_only_n+'</b> WFL-only (red, left) · '+
     '<b style="color:var(--p)">'+r.pc_only_n+'</b> PC-only (blue, right)</div>';
  h+='<div class="cols">';
  h+='<div class="col" style="flex: 1.5; min-width: 320px; border-color: var(--p);">' +
     '<div style="display: flex; justify-content: space-between; align-items: center;">' +
     '<b>Interactive Preview</b> ' +
     '<select id="previewAppSelect" onchange="updatePreview()" style="background:var(--pan); color:var(--fg); border:1px solid var(--ln); border-radius:4px; padding:2px 6px;">' +
     '<option value="pc">PseudoCoup (PC)</option>' +
     '<option value="wfl">WFL (Kotlin)</option>' +
     '</select></div>' +
     '<div id="previewContainer" style="margin-top: 12px; display: flex; justify-content: center;"></div>' +
     '<div id="previewHover" class="muted" style="margin-top: 8px; font-size: 11px; text-align: center; height: 16px;">Hover an element to see size/pos</div></div>';
  h+='<div class="col"><b>WFL — Kotlin tree</b> <span class="muted">(blueprint, statically parsed)</span>'+
     (r.compared?renderTree(r.kt_tree):'<div class="muted" style="padding:8px">no WFL blueprint is mapped to this screen</div>')+'</div>';
  h+='<div class="col"><b>PseudoCoup — PC tree</b> <span class="muted">(build(), statically parsed)</span>'+renderTree(r.tree)+'</div>';
  h+='</div>';
  document.getElementById('main').innerHTML=h;
  
  currentRecord = r;
  updatePreview();
}

function updatePreview() {
  if (!currentRecord) return;
  const app = document.getElementById('previewAppSelect').value;
  const treeToRender = app === 'wfl' ? currentRecord.kt_tree : currentRecord.tree;
  const container = document.getElementById('previewContainer');
  container.innerHTML = '';
  
  if (treeToRender && treeToRender.length > 0) {
    const preview = renderVisualTree(treeToRender);
    container.appendChild(preview);
  } else {
    container.innerHTML = '<div class="muted" style="padding: 40px;">No UI data available to render.</div>';
  }
}

function attachHoverEvents(el, node) {
  el.addEventListener('mouseover', function(e) {
    e.stopPropagation();
    el.style.outline = '2px dashed var(--p)';
    el.style.outlineOffset = '-2px';
    const rect = el.getBoundingClientRect();
    document.getElementById('previewHover').innerHTML = 
      `<b>${esc(node.kind)}</b> ${node.label ? `"${esc(node.label)}"` : ''} · ` +
      `w: ${Math.round(rect.width)}px, h: ${Math.round(rect.height)}px · ` +
      `x: ${Math.round(el.offsetLeft)}px, y: ${Math.round(el.offsetTop)}px`;
    if(node.pair >= 0) hov(node.pair);
  });
  el.addEventListener('mouseout', function(e) {
    el.style.outline = '';
    document.getElementById('previewHover').innerHTML = 'Hover an element to see size/pos';
    hov(-1);
  });
}

function buildHtmlNode(node) {
  let el = document.createElement('div');
  el.style.position = 'relative';
  el.style.boxSizing = 'border-box';
  
  const p = node.props || {};
  let isRow = false;
  const k = (node.kind || '').toLowerCase();
  
  if (k === 'box') {
    el.style.display = 'flex';
    isRow = p.orient === 'H';
    el.style.flexDirection = isRow ? 'row' : 'column';
    if (isRow) el.style.alignItems = 'center';
  } else if (k === 'row' || k.includes('row(')) {
    el.style.display = 'flex';
    el.style.flexDirection = 'row';
    el.style.alignItems = 'center';
  } else if (k === 'column') {
    el.style.display = 'flex';
    el.style.flexDirection = 'column';
  } else if (k === 'layout') {
    el.style.display = 'flex';
    isRow = p.is_horizontal;
    el.style.flexDirection = isRow ? 'row' : 'column';
  } else if (k === 'zone') {
    el.style.display = 'flex';
    el.style.flexDirection = 'column';
    if (p.align === 'center') el.style.alignItems = 'center';
  } else if (k === 'text' || k === 'wfltext') {
    el.innerText = node.label || 'Text';
    el.style.padding = '4px 8px';
    if (p.weight) el.style.fontWeight = p.weight > 0 ? 'bold' : 'normal';
    if (node.role && node.role.includes('title')) el.style.fontSize = '18px';
  } else if (k === 'widget:button' || k === 'button' || k === 'wflbutton') {
    el = document.createElement('button');
    el.innerText = node.label || 'Button';
    el.style.padding = '8px 16px';
    el.style.margin = '4px';
    el.style.borderRadius = '20px';
    el.style.border = 'none';
    el.style.background = 'var(--p)';
    el.style.color = 'white';
    el.style.cursor = 'pointer';
  } else if (k === 'icon' || k === 'wflicon' || k === 'iconbutton') {
    el.innerText = '★'; // placeholder icon
    el.style.display = 'flex';
    el.style.alignItems = 'center';
    el.style.justifyContent = 'center';
    el.style.padding = '4px';
  } else if (k === 'image' || k === 'asyncimage') {
    el.style.background = '#30363d';
    el.style.minHeight = '100px';
    el.style.width = '100%';
    el.innerText = '[Image]';
    el.style.textAlign = 'center';
    el.style.paddingTop = '40px';
  } else {
    // default container
    el.style.display = 'flex';
    el.style.flexDirection = 'column';
    if(node.label) {
        const lbl = document.createElement('div');
        lbl.innerText = node.label;
        lbl.style.fontSize = '10px';
        lbl.style.color = 'var(--mut)';
        el.appendChild(lbl);
    }
  }
  
  // Weights / Width hints
  if (p.weight > 0) {
    el.style.flex = p.weight;
  }
  if (p.width_hint) {
    el.style.width = (p.width_hint * 100) + '%';
  }
  
  // Styling hints
  if (node.role && node.role.includes('card')) {
    el.style.background = 'var(--pan)';
    el.style.border = '1px solid var(--ln)';
    el.style.borderRadius = '8px';
    el.style.padding = '12px';
    el.style.margin = '4px';
  }
  
  if (node.click && node.nav) {
    el.style.cursor = 'pointer';
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      let navDest = node.nav;
      if (navDest && navDest !== '<dynamic>' && navDest !== 'None') {
          // some nav targets might be screen ids
          const rId = Object.keys(byId).find(k => k === navDest || byId[k].slug === navDest);
          if (rId) sel(S_slug(rId));
      }
    });
  }

  attachHoverEvents(el, node);
  
  for (const child of node.children) {
    el.appendChild(buildHtmlNode(child));
  }
  return el;
}

function renderVisualTree(roots) {
  const container = document.createElement('div');
  container.style.width = '375px'; // iPhone dimensions
  container.style.height = '667px';
  container.style.background = '#0e1116';
  container.style.border = '10px solid #222';
  container.style.borderRadius = '24px';
  container.style.overflowY = 'auto';
  container.style.overflowX = 'hidden';
  container.style.display = 'flex';
  container.style.flexDirection = 'column';
  
  for(const r of roots) {
    container.appendChild(buildHtmlNode(r));
  }
  return container;
}

sideList(); sel(byId[DATA.entry]?byId[DATA.entry].slug:Object.values(S).find(r=>r.id).slug);
